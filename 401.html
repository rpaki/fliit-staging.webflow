  <script async="" src="https://cdn.finsweet.com/attributes/v1/fs-forms.js"></script>
  <script defer="" src="https://cdn.jsdelivr.net/npm/@finsweet/attributes-queryparam@1/queryparam.js"></script>

  <script>
window.addEventListener('DOMContentLoaded', () => {
  /* -----------------------
     GENERIC FORM URL INJECTION
  ------------------------ */
  const hiddenUrlInput = document.getElementById('page-url');
  if (hiddenUrlInput) {
    hiddenUrlInput.value = window.location.href;
  }
  const form = document.querySelector('form');
  if (form) {
    form.addEventListener('w-form-success', function() {
      if (hiddenUrlInput) {
        hiddenUrlInput.value = window.location.href;
      }
      const successMessage = this.querySelector('.w-form-done');
      const formContent = this.querySelector('.w-form');
      if (successMessage && formContent) {
        successMessage.style.display = 'none';
        formContent.style.display = 'block';
      }
    });
  }
  /* -----------------------
     VEHICLE BUTTON CLICK HANDLER
     (Keeps existing URL param behaviour)
  ------------------------ */
  document.querySelectorAll('[fs-query="click"]').forEach(button => {
    button.addEventListener('click', function() {
      const param = this.getAttribute('fs-query-param');
      if (param) {
        const currentUrl = new URL(window.location.href);
        const [key, value] = param.split('=');
        currentUrl.searchParams.set(key, value);
        window.history.pushState({}, '', currentUrl);
      }
    });
  });
  /* -----------------------
     VEHICLE MODAL OPEN HANDLER
     (Populates hidden "Vehicle Type" field)
  ------------------------ */
  document.addEventListener('fs-modal-open', function(event) {
  console.log('Modal opened:', event.detail.name); // ✅ Always see if this runs
  if (event.detail.name === 'vehicle') {
    console.log('Vehicle modal detected');
    const params = new URLSearchParams(window.location.search);
    const vehicleType = params.get('vehicle-of-interest');
    console.log('URL param value:', vehicleType);
    const hiddenVehicleInput = document.getElementById('vehicle-type');
    if (vehicleType && hiddenVehicleInput) {
      hiddenVehicleInput.value = vehicleType;
      console.log('Vehicle Type set to:', vehicleType);
    } else {
      console.warn('Vehicle Type input not found or param missing');
    }
  }
});
});
</script>
